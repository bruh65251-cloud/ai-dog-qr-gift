<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Print QR Card</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f4efe7;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .card {
      width: min(88vw, 520px);
      padding: 34px;
      border-radius: 32px;
      background: #fffaf2;
      text-align: center;
      box-shadow: 0 22px 70px rgba(0,0,0,.12);
      border: 1px solid rgba(0,0,0,.08);
    }
    h1 { margin: 0 0 12px; font-size: 28px; }
    p { margin: 0 auto 22px; max-width: 34ch; color: #555; line-height: 1.45; }
    img { width: min(72vw, 330px); height: auto; image-rendering: crisp-edges; }
    .small { margin-top: 16px; font-size: 13px; color: #777; }
    @media print {
      body { background: white; }
      .card { box-shadow: none; border: 0; width: 100%; }
    }
  </style>
</head>
<body>
  <article class="card">
    <h1>A small birthday memory</h1>
    <p>Scan this QR, allow camera access, then point the camera back at this QR.</p>
    <img src="assets/qr.png" alt="QR code for the dog AR memory" />
    <div class="small">Keep the QR flat and bright. The dog appears on top of this QR.</div>
  </article>
</body>
</html>
